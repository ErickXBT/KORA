kind = "web"
previewPath = "/"
title = "KORA Wallet"
version = "1.0.0"
id = "artifacts/kora-wallet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20624

[services.development]
run = "pnpm --filter @workspace/kora-wallet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kora-wallet", "run", "build" ]
publicDir = "artifacts/kora-wallet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20624"
BASE_PATH = "/"
